<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background radial gradient: dark corners, slightly lighter navy center -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%"   stop-color="#002060"/>
      <stop offset="55%"  stop-color="#001040"/>
      <stop offset="100%" stop-color="#000818"/>
    </radialGradient>

    <!-- Glow filter for wave lines -->
    <filter id="glow" x="-30%" y="-300%" width="160%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur12"/>
      <feMerge>
        <feMergeNode in="blur12"/>
        <feMergeNode in="blur5"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for sparkle points -->
    <filter id="sparkle" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Globe meridian clip -->
    <clipPath id="globeClip">
      <circle cx="768" cy="512" r="300"/>
    </clipPath>

    <!-- Grid pattern (circuit board style) -->
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="none"/>
      <path d="M 64 0 L 0 0 L 0 64" fill="none" stroke="rgba(40,140,220,0.13)" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridSmall" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none"/>
      <path d="M 16 0 L 0 0 L 0 16" fill="none" stroke="rgba(40,140,220,0.06)" stroke-width="0.3"/>
    </pattern>

    <!-- Wave stroke gradients: fade each color to transparent at both left/right edges.
         Uses an eased S-curve ramp (0->20% and 80->100%) so the glow blur has room
         to build gradually - avoids the hard brightness "wall" at a sharp opacity step. -->
    <linearGradient id="fadeHalo"  gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1536" y2="0">
      <stop offset="0%"   stop-color="#1060c0" stop-opacity="0"/>
      <stop offset="5%"   stop-color="#1060c0" stop-opacity="0.2"/>
      <stop offset="12%"  stop-color="#1060c0" stop-opacity="0.75"/>
      <stop offset="20%"  stop-color="#1060c0" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#1060c0" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#1060c0" stop-opacity="0.75"/>
      <stop offset="95%"  stop-color="#1060c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1060c0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeMain"  gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1536" y2="0">
      <stop offset="0%"   stop-color="#2090ff" stop-opacity="0"/>
      <stop offset="5%"   stop-color="#2090ff" stop-opacity="0.2"/>
      <stop offset="12%"  stop-color="#2090ff" stop-opacity="0.75"/>
      <stop offset="20%"  stop-color="#2090ff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#2090ff" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#2090ff" stop-opacity="0.75"/>
      <stop offset="95%"  stop-color="#2090ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2090ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeOff"   gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1536" y2="0">
      <stop offset="0%"   stop-color="#40b0ff" stop-opacity="0"/>
      <stop offset="5%"   stop-color="#40b0ff" stop-opacity="0.2"/>
      <stop offset="12%"  stop-color="#40b0ff" stop-opacity="0.75"/>
      <stop offset="20%"  stop-color="#40b0ff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#40b0ff" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#40b0ff" stop-opacity="0.75"/>
      <stop offset="95%"  stop-color="#40b0ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#40b0ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeCrisp" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1536" y2="0">
      <stop offset="0%"   stop-color="#60c8ff" stop-opacity="0"/>
      <stop offset="5%"   stop-color="#60c8ff" stop-opacity="0.2"/>
      <stop offset="12%"  stop-color="#60c8ff" stop-opacity="0.75"/>
      <stop offset="20%"  stop-color="#60c8ff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#60c8ff" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#60c8ff" stop-opacity="0.75"/>
      <stop offset="95%"  stop-color="#60c8ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#60c8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeFaint" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1536" y2="0">
      <stop offset="0%"   stop-color="#90d8ff" stop-opacity="0"/>
      <stop offset="5%"   stop-color="#90d8ff" stop-opacity="0.2"/>
      <stop offset="12%"  stop-color="#90d8ff" stop-opacity="0.75"/>
      <stop offset="20%"  stop-color="#90d8ff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#90d8ff" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#90d8ff" stop-opacity="0.75"/>
      <stop offset="95%"  stop-color="#90d8ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#90d8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1536" height="1024" fill="#000c20"/>
  <!-- Radial gradient overlay -->
  <rect width="1536" height="1024" fill="url(#bgGrad)"/>

  <!-- Fine grid -->
  <rect width="1536" height="1024" fill="url(#gridSmall)"/>
  <!-- Coarse grid -->
  <rect width="1536" height="1024" fill="url(#grid)"/>

  <!-- Globe wireframe (faint) -->
  <g opacity="0.07" stroke="#4090e0" stroke-width="0.8" fill="none" clip-path="url(#globeClip)">
    <!-- Latitude lines -->
    <ellipse cx="768" cy="512" rx="300" ry="300"/>
    <ellipse cx="768" cy="512" rx="300" ry="255"/>
    <ellipse cx="768" cy="512" rx="300" ry="180"/>
    <ellipse cx="768" cy="512" rx="300" ry="100"/>
    <ellipse cx="768" cy="512" rx="300" ry="35"/>
    <!-- Longitude lines (as vertical ellipses) -->
    <ellipse cx="768" cy="512" rx="30"  ry="300"/>
    <ellipse cx="768" cy="512" rx="100" ry="300"/>
    <ellipse cx="768" cy="512" rx="180" ry="300"/>
    <ellipse cx="768" cy="512" rx="250" ry="300"/>
  </g>

  <!--
    Wave design: peaks and troughs positioned INSIDE the desktop visible band
    (SVG y~410-524 at 1200px wide) so curvature is pronounced at all viewport sizes.

    At desktop 1200px: visible y=410-524 (115 SVG units tall).
    At mobile 400px:   visible y=305-651 (346 SVG units tall).

    Both waves meet at crossing point (900, 467) - the center of the desktop band.
    Wave A arches UP to peak ~(442, 421) - visible at desktop, upper portion at mobile.
    Wave B dips DOWN to trough ~(442, 513) - visible at desktop, lower portion at mobile.
    After crossing: Wave A sweeps low-right, Wave B sweeps high-right.
    Waves A2/B2: tight parallel offsets for visual depth.
    No sparkle nodes - clean lines only.
  -->

  <!-- Outer dim halo -->
    <g opacity="0.18">
      <path d="M 0 450 C 300 408 580 408 900 467 C 1100 510 1300 520 1536 515"
            stroke="url(#fadeHalo)" stroke-width="22" fill="none"/>
      <path d="M 0 485 C 300 525 580 525 900 467 C 1100 420 1300 412 1536 415"
            stroke="url(#fadeHalo)" stroke-width="22" fill="none"/>
    </g>

    <!-- Mid glow layer -->
    <g filter="url(#glow)" opacity="0.55">
      <!-- Wave A: arches up to peak ~(442,421), crosses at (900,467), sweeps low-right -->
      <path d="M 0 450 C 300 408 580 408 900 467 C 1100 510 1300 520 1536 515"
            stroke="url(#fadeMain)" stroke-width="4" fill="none"/>
      <!-- Wave B: dips to trough ~(442,513), crosses at (900,467), sweeps high-right -->
      <path d="M 0 485 C 300 525 580 525 900 467 C 1100 420 1300 412 1536 415"
            stroke="url(#fadeMain)" stroke-width="4" fill="none"/>
      <!-- Wave A2: tight parallel offset -->
      <path d="M 0 455 C 300 414 580 414 900 472 C 1100 514 1300 524 1536 519"
            stroke="url(#fadeOff)" stroke-width="2" fill="none"/>
      <!-- Wave B2: tight parallel offset -->
      <path d="M 0 480 C 300 519 580 519 900 473 C 1100 426 1300 418 1536 421"
            stroke="url(#fadeOff)" stroke-width="2" fill="none"/>
    </g>

    <!-- Crisp bright wave lines on top -->
    <g>
      <path d="M 0 450 C 300 408 580 408 900 467 C 1100 510 1300 520 1536 515"
            stroke="url(#fadeCrisp)" stroke-width="1.5" fill="none" opacity="0.9"/>
      <path d="M 0 485 C 300 525 580 525 900 467 C 1100 420 1300 412 1536 415"
            stroke="url(#fadeCrisp)" stroke-width="1.5" fill="none" opacity="0.9"/>
      <path d="M 0 455 C 300 414 580 414 900 472 C 1100 514 1300 524 1536 519"
            stroke="url(#fadeFaint)" stroke-width="1" fill="none" opacity="0.7"/>
      <path d="M 0 480 C 300 519 580 519 900 473 C 1100 426 1300 418 1536 421"
            stroke="url(#fadeFaint)" stroke-width="1" fill="none" opacity="0.7"/>
    </g>

  <!-- Edge vignettes: fade the wave content into the background color at left/right edges.
       Placed on top of all wave layers to definitively cover the glow-blur artifact zone.
       Color matches the approximate background at the banner strip edges (~#000c20 base). -->
  <defs>
    <linearGradient id="vigL" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="320" y2="0">
      <stop offset="0%"   stop-color="#000c20" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#000c20" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000c20" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" gradientUnits="userSpaceOnUse" x1="1216" y1="0" x2="1536" y2="0">
      <stop offset="0%"   stop-color="#000c20" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#000c20" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000c20" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0"    width="320" height="1024" fill="url(#vigL)"/>
  <rect x="1216" width="320" height="1024" fill="url(#vigR)"/>

  <!-- Scattered star dots -->
  <g fill="#80c8ff">
    <circle cx="120"  cy="180" r="1.2" opacity="0.6"/>
    <circle cx="300"  cy="90"  r="0.9" opacity="0.5"/>
    <circle cx="500"  cy="320" r="1.0" opacity="0.4"/>
    <circle cx="680"  cy="70"  r="1.3" opacity="0.65"/>
    <circle cx="900"  cy="200" r="1.1" opacity="0.5"/>
    <circle cx="1100" cy="80"  r="0.8" opacity="0.45"/>
    <circle cx="1300" cy="250" r="1.2" opacity="0.55"/>
    <circle cx="1450" cy="130" r="1.0" opacity="0.5"/>
    <circle cx="200"  cy="800" r="1.1" opacity="0.4"/>
    <circle cx="450"  cy="920" r="0.9" opacity="0.45"/>
    <circle cx="700"  cy="850" r="1.2" opacity="0.5"/>
    <circle cx="1000" cy="950" r="1.0" opacity="0.4"/>
    <circle cx="1250" cy="780" r="1.3" opacity="0.55"/>
    <circle cx="1480" cy="900" r="0.9" opacity="0.45"/>
    <circle cx="60"   cy="420" r="1.0" opacity="0.5"/>
    <circle cx="1520" cy="350" r="1.1" opacity="0.5"/>
    <circle cx="820"  cy="120" r="0.8" opacity="0.4"/>
    <circle cx="640"  cy="940" r="0.9" opacity="0.4"/>
    <!-- Stars in the y=420-620 crossing zone (visible at center-45% crop) -->
    <circle cx="155"  cy="490" r="0.9" opacity="0.45"/>
    <circle cx="430"  cy="455" r="1.0" opacity="0.50"/>
    <circle cx="780"  cy="545" r="1.1" opacity="0.50"/>
    <circle cx="1050" cy="475" r="0.8" opacity="0.45"/>
    <circle cx="1380" cy="580" r="1.0" opacity="0.45"/>
    <circle cx="620"  cy="600" r="0.9" opacity="0.40"/>
    <circle cx="1220" cy="430" r="0.8" opacity="0.40"/>
    <!-- Additional dots: upper field -->
    <circle cx="210"  cy="270" r="0.9" opacity="0.45"/>
    <circle cx="390"  cy="155" r="1.0" opacity="0.50"/>
    <circle cx="560"  cy="210" r="0.8" opacity="0.40"/>
    <circle cx="740"  cy="290" r="1.1" opacity="0.50"/>
    <circle cx="960"  cy="140" r="0.9" opacity="0.45"/>
    <circle cx="1160" cy="305" r="1.0" opacity="0.50"/>
    <circle cx="1360" cy="170" r="0.8" opacity="0.40"/>
    <!-- Additional dots: lower field -->
    <circle cx="140"  cy="700" r="1.0" opacity="0.40"/>
    <circle cx="360"  cy="760" r="0.8" opacity="0.40"/>
    <circle cx="870"  cy="870" r="1.1" opacity="0.45"/>
    <circle cx="1130" cy="720" r="0.9" opacity="0.45"/>
    <circle cx="1390" cy="860" r="1.0" opacity="0.40"/>
    <!-- Additional dots: wave band -->
    <circle cx="95"   cy="535" r="0.9" opacity="0.45"/>
    <circle cx="310"  cy="510" r="0.8" opacity="0.40"/>
    <circle cx="540"  cy="440" r="1.0" opacity="0.50"/>
    <circle cx="990"  cy="520" r="0.9" opacity="0.45"/>
    <circle cx="1170" cy="495" r="0.8" opacity="0.40"/>
    <circle cx="1460" cy="470" r="1.0" opacity="0.45"/>
  </g>

  <!-- 4-pointed sparkle crosses (echo the glinting stars in the logo arc) -->
  <!-- Using filter=sparkle for soft glow; each sparkle is two crossing lines + bright center -->
  <g filter="url(#sparkle)">
    <!-- Upper-left sparkle -->
    <g opacity="0.75" stroke="#b0dcff" stroke-width="0.8" fill="none">
      <line x1="185" y1="148" x2="185" y2="166"/>
      <line x1="176" y1="157" x2="194" y2="157"/>
    </g>
    <circle cx="185" cy="157" r="1.3" fill="#ddf0ff" opacity="0.9"/>
    <!-- Upper-center sparkle -->
    <g opacity="0.70" stroke="#b0dcff" stroke-width="0.8" fill="none">
      <line x1="760" y1="98"  x2="760" y2="114"/>
      <line x1="752" y1="106" x2="768" y2="106"/>
    </g>
    <circle cx="760" cy="106" r="1.2" fill="#ddf0ff" opacity="0.85"/>
    <!-- Upper-right sparkle -->
    <g opacity="0.70" stroke="#b0dcff" stroke-width="0.8" fill="none">
      <line x1="1240" y1="118" x2="1240" y2="134"/>
      <line x1="1232" y1="126" x2="1248" y2="126"/>
    </g>
    <circle cx="1240" cy="126" r="1.1" fill="#ddf0ff" opacity="0.85"/>
    <!-- Wave-band sparkle left (near wave peak) -->
    <g opacity="0.80" stroke="#a8d8ff" stroke-width="0.9" fill="none">
      <line x1="380" y1="418" x2="380" y2="438"/>
      <line x1="370" y1="428" x2="390" y2="428"/>
    </g>
    <circle cx="380" cy="428" r="1.5" fill="#cce8ff" opacity="0.90"/>
    <!-- Wave-band sparkle right (near wave peak, echoing arc sparkles) -->
    <g opacity="0.80" stroke="#a8d8ff" stroke-width="0.9" fill="none">
      <line x1="1145" y1="408" x2="1145" y2="428"/>
      <line x1="1135" y1="418" x2="1155" y2="418"/>
    </g>
    <circle cx="1145" cy="418" r="1.5" fill="#cce8ff" opacity="0.90"/>
    <!-- Smaller sparkle near crossing point -->
    <g opacity="0.65" stroke="#90d0ff" stroke-width="0.7" fill="none">
      <line x1="920" y1="490" x2="920" y2="504"/>
      <line x1="913" y1="497" x2="927" y2="497"/>
    </g>
    <circle cx="920" cy="497" r="1.0" fill="#c0e4ff" opacity="0.80"/>
  </g>
</svg>
